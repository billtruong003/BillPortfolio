<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <filter id="da" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="aa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FDCB6E"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#89B4FA"/>
    </marker>
  </defs>

  <rect width="720" height="420" rx="12" fill="#1E1E2E"/>
  <text x="360" y="30" text-anchor="middle" fill="#CDD6F4" font-size="18" font-weight="700">Mini Game Architecture — Kết hợp mọi Pattern</text>

  <!-- Managers Layer -->
  <rect x="20" y="48" width="680" height="60" rx="8" fill="#6C5CE720" stroke="#6C5CE7" stroke-width="1.5"/>
  <text x="36" y="66" fill="#B4BEFE" font-size="10" font-weight="700" letter-spacing="1">SINGLETONS</text>

  <rect x="40" y="72" width="130" height="28" rx="5" fill="#6C5CE7" filter="url(#da)"/>
  <text x="105" y="91" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">🎮 GameManager</text>

  <rect x="185" y="72" width="130" height="28" rx="5" fill="#6C5CE7" filter="url(#da)"/>
  <text x="250" y="91" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">🔊 AudioManager</text>

  <rect x="330" y="72" width="130" height="28" rx="5" fill="#6C5CE7" filter="url(#da)"/>
  <text x="395" y="91" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">📱 UIManager</text>

  <!-- Events Layer -->
  <rect x="20" y="120" width="680" height="52" rx="8" fill="#FDCB6E15" stroke="#FDCB6E" stroke-width="1.5"/>
  <text x="36" y="138" fill="#FDCB6E" font-size="10" font-weight="700" letter-spacing="1">EVENT BUS</text>

  <rect x="40" y="144" width="115" height="22" rx="4" fill="#F0B429" opacity="0.8"/>
  <text x="97" y="159" text-anchor="middle" fill="#1E1E2E" font-size="9" font-weight="600">OnScoreChanged</text>

  <rect x="168" y="144" width="105" height="22" rx="4" fill="#F0B429" opacity="0.8"/>
  <text x="220" y="159" text-anchor="middle" fill="#1E1E2E" font-size="9" font-weight="600">OnEnemyKilled</text>

  <rect x="286" y="144" width="95" height="22" rx="4" fill="#F0B429" opacity="0.8"/>
  <text x="333" y="159" text-anchor="middle" fill="#1E1E2E" font-size="9" font-weight="600">OnGameOver</text>

  <rect x="394" y="144" width="110" height="22" rx="4" fill="#F0B429" opacity="0.8"/>
  <text x="449" y="159" text-anchor="middle" fill="#1E1E2E" font-size="9" font-weight="600">OnLevelComplete</text>

  <!-- Data Layer -->
  <rect x="500" y="48" width="200" height="60" rx="8" fill="#00B89420" stroke="#00B894" stroke-width="1.5"/>
  <text x="516" y="66" fill="#55EFC4" font-size="10" font-weight="700" letter-spacing="1">SCRIPTABLE OBJECTS</text>

  <rect x="516" y="72" width="80" height="28" rx="5" fill="#00B894" filter="url(#da)"/>
  <text x="556" y="91" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">WeaponData</text>

  <rect x="604" y="72" width="80" height="28" rx="5" fill="#00B894" filter="url(#da)"/>
  <text x="644" y="91" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">EnemyData</text>

  <!-- Gameplay Layer -->
  <rect x="20" y="186" width="420" height="130" rx="8" fill="#31324488" stroke="#45475A" stroke-width="1"/>
  <text x="36" y="204" fill="#9399B2" font-size="10" font-weight="700" letter-spacing="1">GAMEPLAY</text>

  <!-- Player -->
  <rect x="40" y="214" width="120" height="50" rx="6" fill="#0984E3" filter="url(#da)"/>
  <text x="100" y="236" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">🧑 Player</text>
  <text x="100" y="252" text-anchor="middle" fill="#74B9FF" font-size="9">Move + Shoot</text>

  <!-- Weapon -->
  <rect x="175" y="214" width="110" height="50" rx="6" fill="#0984E3" filter="url(#da)"/>
  <text x="230" y="236" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">⚔️ Weapon</text>
  <text x="230" y="252" text-anchor="middle" fill="#74B9FF" font-size="9">Uses WeaponData</text>

  <!-- Enemy -->
  <rect x="300" y="214" width="120" height="50" rx="6" fill="#E17055" filter="url(#da)"/>
  <text x="360" y="236" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">👹 EnemyAI</text>
  <text x="360" y="252" text-anchor="middle" fill="#FFEAA7" font-size="9">Uses EnemyData</text>

  <!-- PlayerHealth -->
  <rect x="40" y="276" width="120" height="30" rx="5" fill="#45475A" stroke="#F38BA8" stroke-width="1"/>
  <text x="100" y="296" text-anchor="middle" fill="#F38BA8" font-size="10" font-weight="600">❤️ PlayerHealth</text>

  <!-- Spawner -->
  <rect x="300" y="276" width="120" height="30" rx="5" fill="#45475A" stroke="#A6E3A1" stroke-width="1"/>
  <text x="360" y="296" text-anchor="middle" fill="#A6E3A1" font-size="10" font-weight="600">🌀 WaveSpawner</text>

  <!-- Pool Layer -->
  <rect x="460" y="186" width="240" height="130" rx="8" fill="#89B4FA15" stroke="#89B4FA" stroke-width="1.5"/>
  <text x="476" y="204" fill="#89B4FA" font-size="10" font-weight="700" letter-spacing="1">OBJECT POOLS</text>

  <rect x="480" y="214" width="100" height="40" rx="6" fill="#313244" stroke="#89B4FA" stroke-width="1"/>
  <text x="530" y="232" text-anchor="middle" fill="#89B4FA" font-size="10" font-weight="600">🔫 BulletPool</text>
  <text x="530" y="246" text-anchor="middle" fill="#9399B2" font-size="9">Get / Return</text>

  <rect x="590" y="214" width="100" height="40" rx="6" fill="#313244" stroke="#89B4FA" stroke-width="1"/>
  <text x="640" y="232" text-anchor="middle" fill="#89B4FA" font-size="10" font-weight="600">✨ VFXPool</text>
  <text x="640" y="246" text-anchor="middle" fill="#9399B2" font-size="9">Get / Return</text>

  <!-- Flow arrows -->
  <!-- Weapon fires event via bullet -->
  <line x1="230" y1="264" x2="476" y2="234" stroke="#89B4FA" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="350" y="245" fill="#89B4FA" font-size="8" transform="rotate(-8, 350, 245)">Get bullet</text>

  <!-- Enemy killed fires event -->
  <line x1="360" y1="214" x2="280" y2="168" stroke="#FDCB6E" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#aa)"/>

  <!-- Player health fires event -->
  <line x1="100" y1="276" x2="140" y2="168" stroke="#FDCB6E" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#aa)"/>

  <!-- Flow description -->
  <rect x="20" y="330" width="680" height="76" rx="8" fill="#313244" filter="url(#da)"/>
  <text x="360" y="350" text-anchor="middle" fill="#FDCB6E" font-size="12" font-weight="700">🔄 Flow Example</text>
  <text x="36" y="372" fill="#CDD6F4" font-size="11">Player bắn → Weapon lấy Bullet từ <tspan fill="#89B4FA">Pool</tspan> → Bullet hit Enemy → Enemy fire <tspan fill="#FDCB6E">GameEvents.EnemyKilled</tspan></text>
  <text x="36" y="392" fill="#CDD6F4" font-size="11">→ <tspan fill="#6C5CE7">UI</tspan> cập nhật score, <tspan fill="#6C5CE7">Audio</tspan> phát sound, <tspan fill="#A6E3A1">Spawner</tspan> spawn thêm. <tspan fill="#A6E3A1" font-weight="600">Không ai phụ thuộc trực tiếp vào ai.</tspan></text>
</svg>