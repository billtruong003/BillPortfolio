<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <filter id="dr" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="ray" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F38BA8"/>
      <stop offset="50%" stop-color="#F38BA8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F38BA8" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="raySphere" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A6E3A1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#A6E3A1" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="720" height="300" rx="12" fill="#1E1E2E"/>
  <text x="360" y="30" text-anchor="middle" fill="#CDD6F4" font-size="18" font-weight="700">Raycast &amp; SphereCast</text>

  <!-- RAYCAST Section -->
  <text x="40" y="62" fill="#89B4FA" font-size="13" font-weight="700">Physics.Raycast — Tia thẳng</text>

  <!-- Ground/scene -->
  <rect x="40" y="130" width="640" height="4" rx="2" fill="#45475A"/>

  <!-- Player -->
  <rect x="60" y="80" width="40" height="50" rx="4" fill="#6C5CE7" filter="url(#dr)"/>
  <circle cx="80" cy="76" r="14" fill="#6C5CE7"/>
  <text x="80" y="80" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">🔫</text>
  <text x="80" y="146" text-anchor="middle" fill="#9399B2" font-size="10">Origin</text>

  <!-- Ray line -->
  <line x1="100" y1="90" x2="460" y2="90" stroke="url(#ray)" stroke-width="2"/>
  <!-- Ray dashed continues -->
  <line x1="460" y1="90" x2="660" y2="90" stroke="#F38BA8" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- Hit point -->
  <circle cx="460" cy="90" r="6" fill="#F38BA8"/>
  <circle cx="460" cy="90" r="10" fill="none" stroke="#F38BA8" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Enemy at hit point -->
  <rect x="440" y="76" width="40" height="54" rx="4" fill="#E17055" filter="url(#dr)"/>
  <text x="460" y="108" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Enemy</text>

  <!-- Hit info -->
  <line x1="460" y1="72" x2="460" y2="52" stroke="#FDCB6E" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="390" y="38" width="140" height="16" rx="3" fill="#45475A"/>
  <text x="460" y="50" text-anchor="middle" fill="#FDCB6E" font-size="9">hit.point  hit.distance  hit.normal</text>

  <!-- Missed object behind -->
  <rect x="560" y="76" width="40" height="54" rx="4" fill="#45475A" stroke="#585B70" stroke-width="1"/>
  <text x="580" y="108" text-anchor="middle" fill="#585B70" font-size="10">Wall</text>
  <text x="580" y="146" text-anchor="middle" fill="#585B70" font-size="9">Không hit</text>

  <!-- Distance label -->
  <line x1="100" y1="110" x2="460" y2="110" stroke="#89B4FA" stroke-width="1"/>
  <line x1="100" y1="106" x2="100" y2="114" stroke="#89B4FA" stroke-width="1"/>
  <line x1="460" y1="106" x2="460" y2="114" stroke="#89B4FA" stroke-width="1"/>
  <text x="280" y="122" text-anchor="middle" fill="#89B4FA" font-size="10">hit.distance</text>

  <!-- SPHERECAST Section -->
  <text x="40" y="178" fill="#A6E3A1" font-size="13" font-weight="700">Physics.SphereCast — Tia "béo" (melee detection)</text>

  <!-- SphereCast player -->
  <rect x="60" y="200" width="40" height="50" rx="4" fill="#6C5CE7" filter="url(#dr)"/>
  <circle cx="80" cy="196" r="14" fill="#6C5CE7"/>
  <text x="80" y="200" text-anchor="middle" fill="#fff" font-size="10">⚔️</text>

  <!-- SphereCast volume -->
  <ellipse cx="250" cy="220" rx="180" ry="40" fill="url(#raySphere)" stroke="#A6E3A1" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Radius labels -->
  <line x1="250" y1="220" x2="250" y2="260" stroke="#A6E3A1" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="262" y="248" fill="#A6E3A1" font-size="9">radius</text>

  <!-- Enemies inside sphere -->
  <rect x="180" y="210" width="30" height="30" rx="4" fill="#E17055" opacity="0.8"/>
  <text x="195" y="230" text-anchor="middle" fill="#fff" font-size="9">E1</text>

  <rect x="290" y="205" width="30" height="30" rx="4" fill="#E17055" opacity="0.8"/>
  <text x="305" y="225" text-anchor="middle" fill="#fff" font-size="9">E2</text>

  <!-- Miss outside -->
  <rect x="500" y="210" width="30" height="30" rx="4" fill="#45475A" stroke="#585B70" stroke-width="1"/>
  <text x="515" y="230" text-anchor="middle" fill="#585B70" font-size="9">E3</text>
  <text x="515" y="255" text-anchor="middle" fill="#585B70" font-size="9">Ngoài range</text>

  <!-- Use case labels -->
  <rect x="460" y="190" width="240" height="68" rx="8" fill="#313244" filter="url(#dr)"/>
  <text x="480" y="210" fill="#89B4FA" font-size="11" font-weight="600">Khi nào dùng?</text>
  <text x="480" y="228" fill="#F38BA8" font-size="10">Raycast → Súng, hitscan, ground check</text>
  <text x="480" y="246" fill="#A6E3A1" font-size="10">SphereCast → Melee, vùng nổ, AoE</text>

  <!-- Bottom legend -->
  <rect x="40" y="274" width="640" height="20" rx="4" fill="#31324466"/>
  <circle cx="60" cy="284" r="4" fill="#F38BA8"/>
  <text x="70" y="288" fill="#9399B2" font-size="10">Raycast: hit vật đầu tiên</text>
  <circle cx="260" cy="284" r="4" fill="#A6E3A1"/>
  <text x="270" y="288" fill="#9399B2" font-size="10">SphereCast: hit trong bán kính</text>
  <circle cx="480" cy="284" r="4" fill="#89B4FA"/>
  <text x="490" y="288" fill="#9399B2" font-size="10">RaycastAll: xuyên qua mọi vật</text>
</svg>