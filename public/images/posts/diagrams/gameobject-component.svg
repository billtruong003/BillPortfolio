<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <filter id="s1" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="gObj" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#5A4BD1"/>
    </linearGradient>
    <linearGradient id="gComp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00B894"/>
      <stop offset="100%" stop-color="#00A381"/>
    </linearGradient>
    <linearGradient id="gScript" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDCB6E"/>
      <stop offset="100%" stop-color="#F0B429"/>
    </linearGradient>
  </defs>

  <rect width="720" height="420" rx="12" fill="#1E1E2E"/>

  <!-- Title -->
  <text x="360" y="38" text-anchor="middle" fill="#CDD6F4" font-size="18" font-weight="600">GameObject = Container of Components</text>

  <!-- GameObject box -->
  <rect x="40" y="60" width="640" height="340" rx="10" fill="#313244" stroke="#45475A" stroke-width="1.5" filter="url(#s1)"/>
  <rect x="40" y="60" width="640" height="42" rx="10" fill="url(#gObj)"/>
  <rect x="40" y="90" width="640" height="12" fill="url(#gObj)"/>
  <text x="360" y="88" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">🎮 GameObject "Player"</text>

  <!-- Transform (always present) -->
  <rect x="70" y="120" width="280" height="62" rx="8" fill="#45475A" stroke="#6C5CE7" stroke-width="2"/>
  <text x="80" y="142" fill="#CDD6F4" font-size="13" font-weight="600">📐 Transform</text>
  <text x="80" y="162" fill="#9399B2" font-size="11">Position (0, 1, 0)  Rotation (0, 0, 0)  Scale (1, 1, 1)</text>
  <rect x="310" y="120" width="80" height="18" rx="4" fill="#6C5CE7" opacity="0.3"/>
  <text x="350" y="133" text-anchor="middle" fill="#B4BEFE" font-size="9" font-weight="600">LUÔN CÓ</text>

  <!-- Mesh Filter + Renderer -->
  <rect x="70" y="196" width="280" height="50" rx="8" fill="#45475A" stroke="url(#gComp)" stroke-width="1.5"/>
  <text x="80" y="218" fill="#CDD6F4" font-size="13" font-weight="600">🔷 Mesh Filter</text>
  <text x="80" y="234" fill="#9399B2" font-size="11">Capsule mesh data</text>

  <rect x="370" y="196" width="280" height="50" rx="8" fill="#45475A" stroke="url(#gComp)" stroke-width="1.5"/>
  <text x="380" y="218" fill="#CDD6F4" font-size="13" font-weight="600">🎨 Mesh Renderer</text>
  <text x="380" y="234" fill="#9399B2" font-size="11">Material, Lighting, Shadows</text>

  <!-- Rigidbody + Collider -->
  <rect x="70" y="260" width="280" height="50" rx="8" fill="#45475A" stroke="url(#gComp)" stroke-width="1.5"/>
  <text x="80" y="282" fill="#CDD6F4" font-size="13" font-weight="600">⚙️ Rigidbody</text>
  <text x="80" y="298" fill="#9399B2" font-size="11">Mass: 1, Gravity: On, Drag: 0</text>

  <rect x="370" y="260" width="280" height="50" rx="8" fill="#45475A" stroke="url(#gComp)" stroke-width="1.5"/>
  <text x="380" y="282" fill="#CDD6F4" font-size="13" font-weight="600">📦 Capsule Collider</text>
  <text x="380" y="298" fill="#9399B2" font-size="11">Height: 2, Radius: 0.5</text>

  <!-- Custom Script -->
  <rect x="70" y="324" width="580" height="56" rx="8" fill="#45475A" stroke="url(#gScript)" stroke-width="2"/>
  <text x="80" y="348" fill="#FDCB6E" font-size="13" font-weight="700">📝 PlayerController.cs</text>
  <text x="80" y="366" fill="#9399B2" font-size="11">moveSpeed: 5    jumpForce: 8    fireRate: 0.25    bulletPrefab: Bullet</text>
  <rect x="555" y="328" width="80" height="18" rx="4" fill="#F0B429" opacity="0.2"/>
  <text x="595" y="341" text-anchor="middle" fill="#FDCB6E" font-size="9" font-weight="600">YOUR CODE</text>
</svg>